<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="mybookings.title">Omat varaukset — Proballers Coaching Finland</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="/">
        <img src="/assets/logo.svg" alt="">
        <span>Proballers <em>Coaching</em></span>
      </a>
      <div id="auth-box"></div>
    </div>
  </header>

  <main class="wrap">
    <div class="dash-title">
      <div>
        <h1 style="font-size:2.4rem" data-i18n="mybookings.heading">Omat varaukset</h1>
        <p class="muted" data-i18n="mybookings.subtitle">Treenisi ja laskusi, kaikki yhdessä paikassa.</p>
      </div>
      <a class="btn btn-primary" href="/#coaches" data-i18n="mybookings.book_another">Varaa uusi treeni</a>
    </div>
    <div id="notices"></div>
    <div class="card" style="overflow-x:auto">
      <table class="data" id="bookings-table"></table>
      <p class="muted" id="empty-note" hidden style="margin:14px 0 4px"><span data-i18n="mybookings.empty.before">Ei vielä varauksia — </span><a href="/#coaches" data-i18n="mybookings.empty.link">valitse valmentaja</a><span data-i18n="mybookings.empty.after"> ja hyppää kentälle.</span></p>
    </div>
    <div id="reviews-section" style="margin-top:22px"></div>
  </main>

  <script src="/js/i18n.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/mybookings.js"></script>
</body>
</html>
