<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08211a">
  <title data-i18n="app.title">Valmentajasovellus — Proballers Coaching</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/logo.svg">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/app.css">
</head>
<body class="app-body">
  <div class="phone">
    <!-- Screen content is rendered per-tab into #view -->
    <main id="view" class="app-view" aria-live="polite">
      <div class="app-loading" data-i18n="app.loading">Ladataan…</div>
    </main>

    <!-- Bottom tab bar -->
    <nav class="tabbar" id="tabbar" hidden>
      <a class="tab" href="#home" data-tab="home">
        <svg viewBox="0 0 24 24" class="tab-ic" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5M5 9.5V20h5v-6h4v6h5V9.5"/></svg>
        <span data-i18n="app.nav.home">Koti</span>
      </a>
      <a class="tab" href="#sessions" data-tab="sessions">
        <svg viewBox="0 0 24 24" class="tab-ic" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        <span data-i18n="app.nav.sessions">Treenit</span>
      </a>
      <a class="tab" href="#calendar" data-tab="calendar">
        <svg viewBox="0 0 24 24" class="tab-ic" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v3M16 3v3"/></svg>
        <span data-i18n="app.nav.calendar">Kalenteri</span>
      </a>
      <a class="tab" href="#alerts" data-tab="alerts">
        <svg viewBox="0 0 24 24" class="tab-ic" aria-hidden="true"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        <span class="tab-badge-wrap"><span data-i18n="app.nav.alerts">Ilmoitukset</span><span class="tab-badge" id="alert-badge" hidden></span></span>
      </a>
      <a class="tab" href="#profile" data-tab="profile">
        <svg viewBox="0 0 24 24" class="tab-ic" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-6 8-6s8 2 8 6"/></svg>
        <span data-i18n="app.nav.profile">Profiili</span>
      </a>
    </nav>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
