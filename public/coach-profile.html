<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="profile.title">Valmentaja — Proballers Coaching</title>
  <meta name="description" data-i18n-content="profile.meta.description" content="Valmentajaprofiili — varaa henkilökohtainen jalkapallotreeni.">
  <link rel="icon" href="/assets/favicon.svg?v=2" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="sale-banner" id="sale-banner" hidden></div>

  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="/">
        <img src="/assets/logo.svg?v=2" alt="">
        <span>Proballers <em>Coaching</em></span>
      </a>
      <div id="auth-box"></div>
    </div>
  </header>

  <main>
    <div class="wrap" id="profile-root">
      <p class="muted" style="padding:40px 0" data-i18n="profile.loading">Ladataan valmentajaa…</p>
    </div>
  </main>

  <footer>
    <div class="wrap">
      <div>
        <strong>Proballers Coaching</strong><br>
        Helsinki · Espoo · Vantaa
      </div>
      <div><span data-i18n="common.footer.tagline">Henkilökohtaista valmennusta nuorille jalkapalloilijoille.</span></div>
    </div>
  </footer>

  <!-- Booking wizard modal (same markup as the landing page) -->
  <div class="modal-backdrop" id="wizard-backdrop">
    <div class="modal" role="dialog" aria-modal="true" data-i18n-aria="booking.wizard.arialabel" aria-label="Varaa treeni">
      <button class="close" id="wizard-close" data-i18n-aria="common.close" aria-label="Sulje">×</button>
      <div id="wizard-body"></div>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/coach-profile.js"></script>
  <script src="/js/booking.js"></script>
</body>
</html>
