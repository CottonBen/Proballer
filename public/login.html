<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="login.title">Kirjaudu sisään — Proballers Coaching</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="/">
        <img src="/assets/logo.svg" alt="">
        <span>Proballers <em>Coaching</em></span>
      </a>
      <div id="auth-box"></div>
    </div>
  </header>

  <main>
    <section class="section" style="min-height:70vh;display:flex;align-items:center">
      <div class="wrap" style="max-width:460px;width:100%">
        <h1 style="font-size:2.6rem" data-i18n="login.heading">Tervetuloa takaisin</h1>
        <p class="muted" data-i18n="login.intro">Yksi ovi kaikille — pelaajille, valmentajille ja
          ylläpidolle. Päädyt suoraan omalle sivullesi.</p>
        <div class="card">
          <div style="display:flex;gap:8px;margin-bottom:16px">
            <button class="btn btn-sm btn-primary" data-tab="login" data-i18n="login.action.login">Kirjaudu sisään</button>
            <button class="btn btn-sm btn-ghost" data-tab="signup" data-i18n="login.action.signup">Luo tili</button>
          </div>
          <form id="auth-form">
            <label class="f" id="f-name" hidden><span data-i18n="login.form.name">Pelaajan / huoltajan nimi</span>
              <input type="text" name="name" autocomplete="name"></label>
            <label class="f"><span data-i18n="login.form.email">Sähköposti</span>
              <input type="email" name="email" required autocomplete="email"></label>
            <label class="f"><span data-i18n="login.form.password">Salasana</span>
              <input type="password" name="password" required autocomplete="current-password"></label>
            <div class="form-error" id="auth-error"></div>
            <button class="btn btn-primary" type="submit" style="width:100%" id="submit-btn" data-i18n="login.action.login">Kirjaudu sisään</button>
          </form>
        </div>
        <p class="small muted" style="margin-top:14px" data-i18n="login.signup.note">Uusille pelaajille:
          tilin luominen vie kymmenen sekuntia, ja sen jälkeen voit varata treenejä ja nähdä laskusi.</p>
      </div>
    </section>
  </main>

  <script src="/js/i18n.js"></script>  <script src="/js/common.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
