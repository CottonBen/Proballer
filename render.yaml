# One-click deploy blueprint for Render (https://render.com).
# Create a new "Blueprint" and point it at this repository.
services:
  - type: web
    name: proballers-coaching
    runtime: node
    plan: starter          # small paid plan => persistent disk for the database
    buildCommand: npm ci
    startCommand: npm start
    # Custom domain. Adding it here (or in the Render dashboard → Settings →
    # Custom Domains) makes Render provision a free Let's Encrypt certificate
    # once the DNS records point at Render. Registered at Gandi; DNS managed in
    # Gandi's free LiveDNS. See DOMAIN-SETUP.md.
    domains:
      - proballerscoaching.com
      - www.proballerscoaching.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_DATA
        value: "0"         # fresh production deploys start clean
      - key: DATA_DIR
        value: /var/data
      # Set these in the Render dashboard (marked sync:false so they are not in git).
      # Payment details printed on invoices (kept out of the source):
      - key: PAYMENT_IBAN
        sync: false
      - key: PAYMENT_PAYEE
        sync: false
      - key: PAYMENT_MOBILEPAY   # optional MobilePay number
        sync: false
      # Initial admin/coach credentials — set these before the first boot:
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: COACH_EMAIL
        sync: false
      - key: COACH_PASSWORD
        sync: false
      # Stripe card payments (set in the dashboard; test keys first):
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Real invoice emails (any SMTP provider — Brevo/Mailgun/Postmark):
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # Google Sheets sync (service account JSON path + sheet id):
      - key: GOOGLE_SERVICE_ACCOUNT
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
    disk:
      name: proballers-data
      mountPath: /var/data
      sizeGB: 1
